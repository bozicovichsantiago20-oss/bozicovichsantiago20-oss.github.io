<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="2; url=https://bozicovichsantiago20-oss.github.io/kit-vendedor-express/" />
    <link rel="canonical" href="https://bozicovichsantiago20-oss.github.io/kit-vendedor-express/" />
    <title>Productos digitales de Santi Bozicovich</title>
    <style>
      :root {
        --ink: #17201b;
        --muted: #5f6d65;
        --paper: #ffffff;
        --wash: #f6f4ed;
        --teal: #0d7c66;
        --amber: #f5b23d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: var(--wash);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
        padding: 32px;
        border: 1px solid #d9e1dc;
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 18px 46px rgba(30, 43, 35, 0.11);
      }

      .tag {
        color: var(--teal);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        font-size: 1.05rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 10px;
        padding: 0 18px;
        border-radius: 8px;
        background: var(--teal);
        color: #ffffff;
        font-weight: 850;
        text-decoration: none;
      }

      strong {
        color: var(--amber);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tag">Producto activo</div>
      <h1>Kit Vendedor Express</h1>
      <p>
        Generador y pack descargable para vendedores online. Respuestas rapidas, prompts,
        checklist y plan de 7 dias.
      </p>
      <p>Pago sugerido: <strong>USD 5</strong> por PayPal o transferencia local.</p>
      <a href="https://bozicovichsantiago20-oss.github.io/kit-vendedor-express/">
        Ver Kit Vendedor Express
      </a>
    </main>
  </body>
</html>
